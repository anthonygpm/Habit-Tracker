version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: habit_tracker_db
    environment:
      POSTGRES_DB: habit_tracker
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: